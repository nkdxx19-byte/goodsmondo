<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケカテキスト Mondo風クイズ</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    background-color: #f4f6f9;
    padding: 20px;
    color: #333;
  }
  
  /* タブのスタイル */
  .tabs {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #bdc3c7;
    max-width: 600px;
    margin: 0 auto 20px auto;
  }
  .tab {
    padding: 12px 24px;
    cursor: pointer;
    background-color: #dcdde1;
    color: #7f8c8d;
    border-radius: 8px 8px 0 0;
    margin: 0 5px;
    font-weight: bold;
    transition: all 0.2s;
    border: 1px solid #bdc3c7;
    border-bottom: none;
  }
  .tab.active {
    background-color: #fff;
    color: #2980b9;
    border-bottom: 2px solid #fff;
    margin-bottom: -2px;
  }

  /* コントロールエリアのスタイル */
  .controls-container {
    background-color: #ecf0f1;
    padding: 15px;
    border-radius: 8px;
    margin: 0 auto 20px auto;
    max-width: 600px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }
  .select-group {
    margin: 10px 0;
  }
  select {
    padding: 8px;
    font-size: 16px;
    border-radius: 4px;
    border: 1px solid #bdc3c7;
    margin: 0 10px;
  }
  .start-btn {
    background-color: #8e44ad;
    color: white;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
  }
  .start-btn:hover { background-color: #9b59b6; }
  
  /* ヒントエリアのスタイル */
  .hint-badge {
    display: inline-block;
    background-color: #34495e;
    color: white;
    padding: 6px 15px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 15px;
  }

  /* ゲームエリアのスタイル */
  .panel-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4px;
    margin: 20px auto;
    max-width: 600px;
    line-height: 1.5;
  }
  .panel {
    width: 32px;
    height: 32px;
    background-color: #2c3e50;
    color: #ecf0f1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    border-radius: 4px;
    transition: background-color 0.2s;
  }
  .panel:hover { background-color: #34495e; }
  .panel.open {
    background-color: #fff;
    color: #2c3e50;
    border: 1px solid #bdc3c7;
    cursor: default;
    width: 30px;
    height: 30px;
    font-size: 18px;
  }
  
  .input-area { margin-top: 20px; }
  input[type="text"] {
    padding: 12px;
    font-size: 16px;
    width: 80%;
    max-width: 300px;
    border: 2px solid #bdc3c7;
    border-radius: 6px;
  }
  button, .share-button {
    padding: 12px 24px;
    font-size: 16px;
    cursor: pointer;
    background-color: #e74c3c;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    font-weight: bold;
    display: inline-block;
    text-decoration: none;
    transition: background-color 0.2s;
  }
  button:hover { background-color: #c0392b; }
  
  #next-btn {
    background-color: #27ae60;
    display: none;
  }
  #next-btn:hover { background-color: #2ecc71; }
  
  /* X（Twitter）共有ボタン独自のスタイル */
  #share-btn {
    background-color: #000000;
    margin-left: 5px;
    display: none; /* 初期状態は非表示 */
  }
  #share-btn:hover {
    background-color: #2f3640;
  }
  
  #message {
    margin-top: 20px;
    font-weight: bold;
    font-size: 20px;
    white-space: pre-wrap;
  }
  .score-board {
    font-size: 18px;
    font-weight: bold;
    background: #fff;
    padding: 15px;
    border-radius: 8px;
    display: inline-block;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    margin-bottom: 10px;
  }
  h2 { color: #2980b9; margin-top: 0; }
  #game-area { display: none; }
</style>
</head>
<body>

<h1>ポケカテキスト Mondo風クイズ</h1>

<div class="tabs">
  <div id="tab-daily" class="tab active" onclick="switchTab('daily')">本日の一問</div>
  <div id="tab-endless" class="tab" onclick="switchTab('endless')">エンドレスモード</div>
</div>

<div id="endless-controls" class="controls-container" style="display: none;">
  <h3>エンドレス出題フィルター設定</h3>
  <div class="select-group">
    <label>レギュレーション:
      <select id="formatSelect">
        <option value="スタンダード">スタンダード</option>
        <option value="エクストラ">エクストラ</option>
      </select>
    </label>
  </div>
  <div class="select-group">
    <label>カードの種類:
      <select id="typeSelect">
        <option value="グッズ">グッズ</option>
        <option value="サポート">サポート</option>
        <option value="スタジアム">スタジアム</option>
        <option value="ポケモンのどうぐ">ポケモンのどうぐ</option>
      </select>
    </label>
  </div>
  <button class="start-btn" onclick="startFilteredMode()">この条件でスタート！</button>
</div>

<div id="game-area">
  <h2 id="mode-title">本日の一問</h2>
  
  <div id="hint-area" class="hint-badge"></div>
  <br>

  <div class="score-board">
    残り解答回数: <span id="tries" style="color: #e74c3c;">3</span>回<br>
    現在のスコア: <span id="score" style="color: #2980b9;">0</span>点
  </div>

  <div id="panels" class="panel-container"></div>

  <div class="input-area">
    <input type="text" id="answerInput" placeholder="カード名を入力 (例: ナンジャモ)">
    <br>
    <button id="submit-btn" onclick="checkAnswer()">解答する</button>
    <button id="next-btn" onclick="loadNextQuestion()">次の問題へ進む</button>
    <a id="share-btn" class="share-button" target="_blank">Xに結果を共有</a>
  </div>

  <div id="message"></div>
</div>

<script src="data.js"></script>
<script>
const fallbackData = [
  { question: "データがありません。data.jsを確認してください。", answer: "エラー", type: "グッズ", format: ["スタンダード", "エクストラ"] }
];
const allCards = (typeof pokemonCardsData !== 'undefined') ? pokemonCardsData : fallbackData;

let currentMode = 'daily';
let currentPool = []; 
let questionText = "";
let correctAnswer = "";
let tries = 3;
let score = 0;
let gameOver = false;

function switchTab(mode) {
  currentMode = mode;
  document.getElementById('tab-daily').classList.remove('active');
  document.getElementById('tab-endless').classList.remove('active');
  document.getElementById('share-btn').style.display = 'none'; // シェアボタンを隠す
  
  if (mode === 'daily') {
    document.getElementById('tab-daily').classList.add('active');
    document.getElementById('endless-controls').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    startDailyMode();
  } else {
    document.getElementById('tab-endless').classList.add('active');
    document.getElementById('endless-controls').style.display = 'block';
    document.getElementById('game-area').style.display = 'none'; 
  }
}

function getDailyIndex(max) {
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
  const x = Math.sin(seed) * 10000;
  return Math.floor((x - Math.floor(x)) * max);
}

function startDailyMode() {
  const dailyPool = allCards.filter(card => card.format.includes("スタンダード"));

  if (dailyPool.length === 0) {
    alert("「スタンダード」のカードデータが登録されていません！data.jsを確認してください。");
    return;
  }

  const dailyCard = dailyPool[getDailyIndex(dailyPool.length)];
  document.getElementById('mode-title').innerText = "本日の一問（スタンダード固定）";
  document.getElementById('hint-area').innerText = `カードの種類：${dailyCard.type}`;
  
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('submit-btn').style.display = 'inline-block';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('share-btn').style.display = 'none';
  
  setupGame(dailyCard);
}

function startFilteredMode() {
  const selectedFormat = document.getElementById('formatSelect').value;
  const selectedType = document.getElementById('typeSelect').value;

  currentPool = allCards.filter(card => {
    return card.type === selectedType && card.format.includes(selectedFormat);
  });

  if (currentPool.length === 0) {
    alert(`「${selectedFormat}」の「${selectedType}」のデータが登録されていません！`);
    return;
  }

  document.getElementById('mode-title').innerText = `エンドレスモード`;
  document.getElementById('hint-area').innerText = `条件：${selectedFormat} / ${selectedType}`;
  document.getElementById('game-area').style.display = 'block';
  
  loadNextQuestion();
}

function loadNextQuestion() {
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('submit-btn').style.display = 'inline-block';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('share-btn').style.display = 'none';
  
  const randomCard = currentPool[Math.floor(Math.random() * currentPool.length)];
  setupGame(randomCard);
}

function setupGame(cardData) {
  questionText = cardData.question;
  correctAnswer = cardData.answer;
  tries = 3;
  score = questionText.length;
  gameOver = false;
  
  document.getElementById('tries').innerText = tries;
  document.getElementById('score').innerText = score;
  document.getElementById('message').innerText = "";
  document.getElementById('answerInput').value = "";
  
  const panelsContainer = document.getElementById('panels');
  panelsContainer.innerHTML = ""; 
  
  for (let i = 0; i < questionText.length; i++) {
    const char = questionText[i];
    const div = document.createElement('div');
    
    div.className = 'panel';
    div.innerText = i + 1;
    div.dataset.char = char; 
    div.onclick = () => openPanel(div);
    
    panelsContainer.appendChild(div);
  }
}

function openPanel(element) {
  if (gameOver || element.classList.contains('open')) return;
  
  element.classList.add('open');
  element.innerText = element.dataset.char;
  score--; 
  document.getElementById('score').innerText = score;
}

function toKatakana(str) {
  return str.replace(/[\u3041-\u3096]/g, function(match) {
    var chr = match.charCodeAt(0) + 0x60;
    return String.fromCharCode(chr);
  });
}

function checkAnswer() {
  if (gameOver) return;
  
  const input = document.getElementById('answerInput').value.trim();
  if (!input) return;

  const normalizedInput = toKatakana(input);
  const normalizedAnswer = toKatakana(correctAnswer);

  if (normalizedInput === normalizedAnswer) {
    document.getElementById('message').innerText = `大正解！🎉\n獲得スコア: ${score}点\nカード名: ${correctAnswer}`;
    document.getElementById('message').style.color = "#27ae60";
    endGame(true);
  } else {
    tries--;
    document.getElementById('tries').innerText = tries;
    if (tries <= 0) {
      document.getElementById('message').innerText = `ゲームオーバー...\n正解は「${correctAnswer}」でした！`;
      document.getElementById('message').style.color = "#c0392b";
      endGame(false);
    } else {
      document.getElementById('message').innerText = "不正解！もう一度よく考えてみよう！";
      document.getElementById('message').style.color = "#e67e22";
    }
  }
}

// 【機能改善】引数に正解したかどうかのフラグ(isWin)を追加
function endGame(isWin) {
  gameOver = true;
  document.getElementById('submit-btn').disabled = true; 
  
  // --- X（Twitter）共有テキストの自動生成（本日の一問モードのみ） ---
  if (currentMode === 'daily') {
    const totalChars = questionText.length;
    const openedChars = totalChars - score;
    
    // 現在の盤面の状態を 💥 と 🔲 の文字列に変換
    const panels = document.querySelectorAll('.panel');
    let gridResult = "";
    panels.forEach(p => {
      gridResult += p.classList.contains('open') ? "💥" : "🔲";
    });
    
    let resultMessage = "";
    if (isWin) {
      const attemptCount = 4 - tries; // 何回目の解答かを算出
      resultMessage = `${openedChars}/${totalChars}、${attemptCount}回目の解答で正解しました！`;
    } else {
      resultMessage = `${openedChars}/${totalChars}、正解を導き出せませんでした...`;
    }
    
    // 共有用URLとして、現在のブラウザのURLを自動取得
    const siteUrl = window.location.href;
    
    // 指定されたフォーマット通りにテキストを構成
    const shareText = `${resultMessage}\n${gridResult}\n#ポケカmondo\n${siteUrl}`;
    
    // シェア用ボタンのhref属性にインテントリンクをセットして表示
    const shareBtn = document.getElementById('share-btn');
    shareBtn.href = `https://x.com/intent/tweet?text=${encodeURIComponent(shareText)}`;
    shareBtn.style.display = 'inline-block';
  }
  // -------------------------------------------------------------

  // すべてのパネルを強制的に開けて正解の文字を表示
  const panels = document.querySelectorAll('.panel');
  panels.forEach(p => {
    p.classList.add('open');
    p.innerText = p.dataset.char;
  });

  if (currentMode === 'endless') {
    document.getElementById('next-btn').style.display = 'inline-block';
    document.getElementById('submit-btn').style.display = 'none';
  }
}

window.onload = () => {
  switchTab('daily');
};
</script>
</body>
</html>
